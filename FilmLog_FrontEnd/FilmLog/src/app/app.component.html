<<ion-app>

  <ion-header *ngIf="showHeader()">
    <ion-toolbar>
      <ion-title>FilmLog</ion-title>

      <ion-buttons slot="end">
        <ion-button class="logout-btn" (click)="confirmLogout()">
          Logout
        </ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <ion-content>
    <ion-router-outlet></ion-router-outlet>
  </ion-content>

  <ion-footer *ngIf="showHeader()">
    <ion-tab-bar>

      <ion-tab-button routerLink="/search">
        <ion-icon name="search-outline"></ion-icon>
        <ion-label>Search</ion-label>
      </ion-tab-button>

      <ion-tab-button routerLink="/watchlist">
        <ion-icon name="bookmark-outline"></ion-icon>
        <ion-label>Watchlist</ion-label>
      </ion-tab-button>

      <ion-tab-button routerLink="/watched">
        <ion-icon name="checkmark-circle-outline"></ion-icon>
        <ion-label>Watched</ion-label>
      </ion-tab-button>

      <ion-tab-button routerLink="/statistics">
        <ion-icon name="bar-chart-outline"></ion-icon>
        <ion-label>Stats</ion-label>
      </ion-tab-button>

    </ion-tab-bar>
  </ion-footer>

</ion-app>
